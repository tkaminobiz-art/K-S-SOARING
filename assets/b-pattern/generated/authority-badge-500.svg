<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500" role="img" aria-labelledby="title desc">
  <title id="title">実績五百件以上</title>
  <desc id="desc">金色の権威バッジに実績五百件以上と記載</desc>
  <defs>
    <linearGradient id="gold" x1="65" y1="34" x2="356" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3a8"/>
      <stop offset=".18" stop-color="#f7d24c"/>
      <stop offset=".44" stop-color="#b97813"/>
      <stop offset=".66" stop-color="#ffe77a"/>
      <stop offset="1" stop-color="#b46a08"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="118" y1="64" x2="300" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9cb"/>
      <stop offset=".35" stop-color="#f6d85f"/>
      <stop offset=".7" stop-color="#d8971a"/>
      <stop offset="1" stop-color="#fff0a0"/>
    </linearGradient>
    <radialGradient id="navyCore" cx="48%" cy="35%" r="62%">
      <stop offset="0" stop-color="#263b52"/>
      <stop offset=".56" stop-color="#112236"/>
      <stop offset="1" stop-color="#071526"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="104" y1="310" x2="315" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10283f"/>
      <stop offset=".62" stop-color="#071526"/>
      <stop offset="1" stop-color="#000a16"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#001a36" flood-opacity=".32"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ffffff" flood-opacity=".45"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M127 304 L72 462 L156 418 L198 498 L221 336 Z" fill="url(#ribbon)" stroke="#dba73c" stroke-width="7" stroke-linejoin="round"/>
    <path d="M293 304 L348 462 L264 418 L222 498 L199 336 Z" fill="url(#ribbon)" stroke="#dba73c" stroke-width="7" stroke-linejoin="round"/>

    <circle cx="210" cy="205" r="174" fill="url(#gold)"/>
    <circle cx="210" cy="205" r="157" fill="#fff5b3" opacity=".72"/>
    <circle cx="210" cy="205" r="146" fill="url(#navyCore)" stroke="url(#goldLight)" stroke-width="11"/>
    <circle cx="210" cy="205" r="124" fill="none" stroke="#f6d45c" stroke-width="3" opacity=".82"/>
    <circle cx="210" cy="205" r="112" fill="none" stroke="#ffffff" stroke-width="1.5" opacity=".25"/>

    <path d="M165 88 L188 120 L210 75 L233 120 L256 88 L249 137 L171 137 Z" fill="url(#goldLight)" stroke="#f9e27d" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="210" cy="75" r="8" fill="#fff3a8"/>
    <circle cx="165" cy="88" r="6" fill="#fff3a8"/>
    <circle cx="256" cy="88" r="6" fill="#fff3a8"/>

    <text x="210" y="163" text-anchor="middle" font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="23" font-weight="900" letter-spacing=".08em" fill="#ffe783">自社累計</text>
    <text x="210" y="214" text-anchor="middle" font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="50" font-weight="900" fill="#ffffff" stroke="#071526" stroke-width="4" paint-order="stroke">実績</text>
    <text x="210" y="291" text-anchor="middle" font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="76" font-weight="900" fill="#ffe768" stroke="#071526" stroke-width="5" paint-order="stroke">五百件</text>
    <text x="210" y="342" text-anchor="middle" font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="40" font-weight="900" fill="#ffffff" stroke="#071526" stroke-width="4" paint-order="stroke">以上</text>

    <path d="M75 102 l11 23 25 4-18 17 5 25-23-12-22 12 4-25-18-17 25-4z" fill="#fff7b8" opacity=".82"/>
    <path d="M337 270 l8 17 18 3-13 12 3 18-16-9-16 9 3-18-13-12 18-3z" fill="#fff0a4" opacity=".88"/>
    <path d="M333 88 l6 36 32 10-32 10-6 36-7-36-32-10 32-10z" fill="#ffffff" opacity=".9"/>
    <path d="M92 297 l4 23 20 7-20 6-4 23-4-23-21-6 21-7z" fill="#ffffff" opacity=".76"/>
